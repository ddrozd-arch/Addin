<svg width="256" height="256" viewBox="0 0 256 256"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="mailBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5FA8FF"/>
      <stop offset="100%" stop-color="#1C6EDC"/>
    </linearGradient>

    <linearGradient id="mailFlap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E7DE7"/>
      <stop offset="100%" stop-color="#1659B4"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6"
                    flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Koperta -->
  <g filter="url(#softShadow)">
    <!-- Body -->
    <rect x="32" y="88" width="176" height="104" rx="18"
          fill="url(#mailBody)"/>

    <!-- Klapka -->
    <path d="M32 88 L120 148 L208 88 Z"
          fill="url(#mailFlap)"/>

    <!-- Kartka w środku -->
    <rect x="52" y="92" width="136" height="72" rx="8"
          fill="white" opacity="0.96"/>

    <!-- Linie tekstu -->
    <rect x="64" y="108" width="88" height="6" rx="3"
          fill="#D0D7E5" />
    <rect x="64" y="122" width="72" height="6" rx="3"
          fill="#D0D7E5" />
  </g>

  <!-- Badge ostrzegawczy -->
  <g filter="url(#softShadow)">
    <circle cx="196" cy="68" r="30" fill="#FF8A00"/>

    <rect x="190" y="48" width="12" height="28" rx="6" fill="white"/>
    <circle cx="196" cy="82" r="5" fill="white"/>
  </g>

</svg>
